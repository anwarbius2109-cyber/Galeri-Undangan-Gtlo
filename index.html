<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<title>Malirainvitation.co</title>

<style>
body{
  background:#0f0a05;
  color:#f5f5f5;
  font-family:sans-serif;
}

/* GLASS */
.glass{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;
}

/* BUTTON */
.btn{
  background:linear-gradient(135deg,#8b5e34,#d4a373);
  padding:10px 20px;
  border-radius:10px;
}

/* CATEGORY */
.cat{
  padding:8px 14px;
  border-radius:999px;
  font-size:12px;
  cursor:pointer;
  background:#2a1a10;
}
.cat.active{
  background:linear-gradient(135deg,#8b5e34,#d4a373);
}

/* SKELETON */
.skeleton{
  background:linear-gradient(90deg,#2a1a10,#3a2518,#2a1a10);
  background-size:200% 100%;
  animation:loading 1.2s infinite;
  border-radius:10px;
}
@keyframes loading{
  0%{background-position:200% 0}
  100%{background-position:-200% 0}
}

/* MOBILE NAV */
.mobile-nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#1a120c;
  display:none;
  justify-content:space-around;
  padding:10px;
}
.mobile-nav a{
  font-size:11px;
  text-align:center;
}
@media(max-width:768px){
  .mobile-nav{display:flex}
  body{padding-bottom:70px}
}
</style>
</head>

<body>

<!-- HEADER -->
<header class="sticky top-0 z-50 glass">
  <div class="max-w-6xl mx-auto flex justify-between items-center px-4 py-3">
    <div class="flex items-center gap-2">
      <img src="/assets/Malirainvitation.co.png" width="40">
      <b>Malirainvitation</b>
    </div>

    <nav class="hidden md:flex gap-4 text-sm">
      <a href="#home">Home</a>
      <a href="#tema">Tema</a>
      <a href="#paket">Paket</a>
    </nav>

    <a href="https://wa.me/6281279281358" class="btn text-white">Hubungi</a>
  </div>
</header>

<!-- HERO -->
<section id="home" class="text-center py-24">
<h1 class="text-5xl font-bold mb-4">Undangan Digital Premium</h1>
<p class="mb-6">Elegan, modern & praktis hanya dengan 1 link</p>
<a href="#tema" class="btn text-white">Lihat Tema</a>
</section>

<!-- TEMA -->
<section id="tema" class="py-16">
<div class="max-w-6xl mx-auto px-4">

<input id="searchInput" placeholder="Cari tema..."
class="w-full p-3 rounded mb-4 text-black">

<div id="categories" class="flex flex-wrap gap-2 mb-4"></div>

<div id="themes" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>

</div>
</section>

<!-- FOOTER PREMIUM -->
<footer class="text-center py-12 border-t border-white/10">

  <img src="/assets/Malirainvitation.co.png" width="70" class="mx-auto mb-4">

  <h3 class="text-lg font-semibold mb-2">Malirainvitation</h3>
  <p class="text-sm opacity-70 mb-6">Undangan Digital Modern & Elegan</p>

  <div class="flex justify-center gap-4 mb-6">

    <a href="https://instagram.com/malirainvitation.co" target="_blank"
    class="glass p-3 hover:scale-110 transition">📸</a>

    <a href="https://wa.me/6281279281358" target="_blank"
    class="glass p-3 hover:scale-110 transition">💬</a>

    <a href="https://facebook.com/" target="_blank"
    class="glass p-3 hover:scale-110 transition">👍</a>

    <a href="https://tiktok.com/" target="_blank"
    class="glass p-3 hover:scale-110 transition">🎵</a>

  </div>

  <p class="text-xs opacity-50">
    © 2026 Malirainvitation. All rights reserved.
  </p>

</footer>

<!-- SCRIPT -->
<script>
const baseUrl="https://webinvit.id";
const phone="6281279281358";

let allThemes=[];
let activeCategory="Semua";
let currentPage=1;
const perPage=8;

/* CATEGORY */
const categories=[
"Semua","Wedding","Kids & Birthday","Aqiqah & Tasmiyah",
"Tasyakuran Khitan","Umum & Seminar","Christmas & New Year",
"Party & Dinner","School & Graduation"
];

const catWrap=document.getElementById("categories");
categories.forEach(cat=>{
  const btn=document.createElement("button");
  btn.innerText=cat;
  btn.className="cat";
  if(cat==="Semua") btn.classList.add("active");

  btn.onclick=()=>{
    document.querySelectorAll(".cat").forEach(x=>x.classList.remove("active"));
    btn.classList.add("active");
    activeCategory=cat;
    currentPage=1;
    applyFilter();
  };

  catWrap.appendChild(btn);
});

/* SKELETON */
function showSkeleton(){
const el=document.getElementById("themes");
el.innerHTML="";
for(let i=0;i<8;i++){
  el.innerHTML+=`
  <div class="glass p-2">
    <div class="skeleton h-32 w-full"></div>
    <div class="skeleton h-4 mt-2 w-3/4"></div>
    <div class="grid grid-cols-2 gap-2 mt-2">
      <div class="skeleton h-6"></div>
      <div class="skeleton h-6"></div>
    </div>
  </div>`;
}
}

/* LOAD */
async function loadThemes(){
showSkeleton();

let url=baseUrl+"/seller/api/v1/products/websites?limit=50";

while(url){
  const res=await fetch(url);
  const json=await res.json();
  allThemes=allThemes.concat(json.data.data);
  url=json.data.next_page_url;
}
applyFilter();
}

/* CATEGORY LOGIC */
function getCategory(name){
const n=name.toLowerCase();
if(n.includes("wedding")||n.includes("nikah")) return "Wedding";
if(n.includes("birthday")||n.includes("ulang")) return "Kids & Birthday";
if(n.includes("aqiqah")) return "Aqiqah & Tasmiyah";
if(n.includes("khitan")) return "Tasyakuran Khitan";
if(n.includes("seminar")) return "Umum & Seminar";
if(n.includes("christmas")) return "Christmas & New Year";
if(n.includes("party")||n.includes("dinner")) return "Party & Dinner";
if(n.includes("graduation")||n.includes("wisuda")) return "School & Graduation";
return "Other";
}

/* FILTER */
function applyFilter(){
const keyword=document.getElementById("searchInput").value.toLowerCase();

const filtered=allThemes.filter(t=>{
  const name=t.name.toLowerCase();
  const category=getCategory(t.name);

  return (
    name.includes(keyword) &&
    (activeCategory==="Semua" || category===activeCategory)
  );
});

render(filtered);
}

/* RENDER */
function render(data){
const el=document.getElementById("themes");
el.innerHTML="";

const start=(currentPage-1)*perPage;
const pageData=data.slice(start,start+perPage);

pageData.forEach(t=>{
  el.innerHTML+=`
  <div class="glass p-2">
    <img src="${t.featured_image}" loading="lazy" class="rounded">
    <h3 class="text-sm mt-2">${t.name}</h3>
    <div class="grid grid-cols-2 gap-2 mt-2">
      <a href="${baseUrl}/preview/${t.slug}" target="_blank" class="bg-gray-200 text-black text-center">Preview</a>
      <a href="https://wa.me/${phone}?text=${encodeURIComponent("Pesan "+t.name)}" target="_blank" class="bg-purple-600 text-white text-center">Pesan</a>
    </div>
  </div>`;
});

renderPagination(data.length);
}

/* PAGINATION */
function renderPagination(total){
const totalPages=Math.ceil(total/perPage);
let html=`<div class="col-span-full flex justify-center gap-2 mt-6">`;

for(let i=1;i<=totalPages;i++){
  html+=`
  <button class="cat ${i===currentPage?"active":""}"
  onclick="goPage(${i})">${i}</button>`;
}

html+=`</div>`;
document.getElementById("themes").innerHTML+=html;
}

function goPage(i){
currentPage=i;
applyFilter();
window.scrollTo({top:document.getElementById("tema").offsetTop-80,behavior:"smooth"});
}

/* SEARCH */
document.getElementById("searchInput")
.addEventListener("input",()=>{
currentPage=1;
applyFilter();
});

loadThemes();
</script>

</body>
</html>
